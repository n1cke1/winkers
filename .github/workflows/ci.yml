name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check version consistency
        run: |
          VER_TOML=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
          VER_INIT=$(python -c "import re; m=re.search(r'__version__\s*=\s*[\"\'](.*?)[\"\']', open('src/winkers/__init__.py').read()); print(m.group(1))")
          echo "pyproject.toml: $VER_TOML"
          echo "__init__.py:    $VER_INIT"
          if [ "$VER_TOML" != "$VER_INIT" ]; then
            echo "ERROR: version mismatch"
            exit 1
          fi

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
